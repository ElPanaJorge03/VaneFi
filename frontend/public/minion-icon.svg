  <ellipse cx="155" cy="115" rx="15" ry="35" fill="#FFD700"/>
  
  <!-- Hand details -->
  <circle cx="40" cy="150" r="10" fill="#FFD700"/>
  <circle cx="160" cy="150" r="10" fill="#FFD700"/>
  
  <!-- Feet -->
